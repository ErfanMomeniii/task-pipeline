apiVersion: v1
kind: Service
metadata:
  name: consumer
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "task-pipeline.labels" . | nindent 4 }}
    app.kubernetes.io/name: consumer
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.consumer.grpcPort }}
      targetPort: grpc
      name: grpc
    - port: {{ .Values.consumer.metricsPort }}
      targetPort: metrics
      name: metrics
  selector:
    app.kubernetes.io/name: consumer
    app.kubernetes.io/instance: {{ .Release.Name }}
